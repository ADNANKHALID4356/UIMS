server {
  listen 80;
  server_name uims.ummahtechinnovations.com;

  # Increase for occasional large payloads (snapshots, etc)
  client_max_body_size 50m;

  # Web (Vite build) served by nginx
  root /var/www/uims-web;
  index index.html;

  # Downloadable installer (.exe)
  location /downloads/ {
    # Served from the same root: /var/www/uims-web/downloads/
    add_header Content-Disposition "attachment";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # API reverse proxy
  location /api/ {
    proxy_pass http://127.0.0.1:8788/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://127.0.0.1:8788/health;
  }
}

